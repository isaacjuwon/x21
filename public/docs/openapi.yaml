openapi: 3.0.3
info:
  title: 'Laravel API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://ship.test'
tags:
  -
    name: Authentication
    description: ''
  -
    name: Endpoints
    description: ''
  -
    name: KYC
    description: 'Identity verification'
  -
    name: Loans
    description: 'Loan application and management'
  -
    name: Services
    description: 'VTU and bill payment services'
  -
    name: Shares
    description: 'Share orders and holdings'
  -
    name: Support
    description: 'FAQ and support resources'
  -
    name: Tickets
    description: 'Support ticket management'
  -
    name: User
    description: 'Authenticated user profile'
  -
    name: Wallet
    description: 'Wallet balance and overview'
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Get a bearer token from the `POST /v1/auth/login` endpoint.'
security:
  -
    default: []
paths:
  /v1/auth/register:
    post:
      summary: Register
      operationId: register
      description: 'Create a new account and issue a Sanctum bearer token.'
      parameters: []
      responses:
        201:
          description: 'Registration succeeded.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: ''
                    type: users
                    attributes:
                      name: 'Justina Gaylord'
                      email: lafayette.considine@example.com
                      email_verified_at: '2026-04-22T13:19:15+00:00'
                      created_at: null
                      updated_at: null
                  meta:
                    token: 1|example-token
                    token_type: Bearer
                    expires_at: null
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: ''
                      type:
                        type: string
                        example: users
                      attributes:
                        type: object
                        properties:
                          name:
                            type: string
                            example: 'Justina Gaylord'
                          email:
                            type: string
                            example: lafayette.considine@example.com
                          email_verified_at:
                            type: string
                            example: '2026-04-22T13:19:15+00:00'
                          created_at:
                            type: string
                            example: null
                            nullable: true
                          updated_at:
                            type: string
                            example: null
                            nullable: true
                  meta:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|example-token
                      token_type:
                        type: string
                        example: Bearer
                      expires_at:
                        type: string
                        example: null
                        nullable: true
        422:
          description: 'Validation failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    email:
                      - 'The email has already been taken.'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email has already been taken.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Display name for the account.'
                  example: 'Jane Doe'
                email:
                  type: string
                  description: 'Unique email address for login.'
                  example: jane@example.com
                password:
                  type: string
                  description: 'Account password.'
                  example: password123
                device_name:
                  type: string
                  description: 'Client device label for token tracking.'
                  example: ios-app
              required:
                - name
                - email
                - password
      security: []
  /v1/auth/login:
    post:
      summary: Login
      operationId: login
      description: 'Authenticate a user and issue a Sanctum bearer token.'
      parameters: []
      responses:
        200:
          description: 'Login succeeded.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: ''
                    type: users
                    attributes:
                      name: 'Justina Gaylord'
                      email: cormier.nick@example.com
                      email_verified_at: '2026-04-22T13:19:16+00:00'
                      created_at: null
                      updated_at: null
                  meta:
                    token: 1|example-token
                    token_type: Bearer
                    expires_at: null
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: ''
                      type:
                        type: string
                        example: users
                      attributes:
                        type: object
                        properties:
                          name:
                            type: string
                            example: 'Justina Gaylord'
                          email:
                            type: string
                            example: cormier.nick@example.com
                          email_verified_at:
                            type: string
                            example: '2026-04-22T13:19:16+00:00'
                          created_at:
                            type: string
                            example: null
                            nullable: true
                          updated_at:
                            type: string
                            example: null
                            nullable: true
                  meta:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|example-token
                      token_type:
                        type: string
                        example: Bearer
                      expires_at:
                        type: string
                        example: null
                        nullable: true
        422:
          description: 'Credentials were invalid.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    email:
                      - 'The provided credentials are incorrect.'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The provided credentials are incorrect.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'User email address.'
                  example: jane@example.com
                password:
                  type: string
                  description: 'User password.'
                  example: password123
                device_name:
                  type: string
                  description: 'Client device label for token tracking.'
                  example: ios-app
              required:
                - email
                - password
                - device_name
      security: []
  /v1/auth/forgot-password:
    post:
      summary: 'Request Password Reset'
      operationId: requestPasswordReset
      description: 'Send a password reset link to the provided email if an account exists.'
      parameters: []
      responses:
        200:
          description: 'Password reset request accepted.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'If the account exists, a password reset link has been sent.'
                properties:
                  message:
                    type: string
                    example: 'If the account exists, a password reset link has been sent.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Account email address.'
                  example: jane@example.com
              required:
                - email
      security: []
  /v1/auth/reset-password:
    post:
      summary: 'Reset Password'
      operationId: resetPassword
      description: 'Reset the user password using a valid reset token.'
      parameters: []
      responses:
        200:
          description: 'Password reset succeeded.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Your password has been reset.'
                properties:
                  message:
                    type: string
                    example: 'Your password has been reset.'
        422:
          description: 'Reset token or payload was invalid.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    email:
                      - 'This password reset token is invalid.'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'This password reset token is invalid.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: 'Password reset token.'
                  example: reset-token-value
                email:
                  type: string
                  description: 'Account email associated with token.'
                  example: jane@example.com
                password:
                  type: string
                  description: 'New account password.'
                  example: new-password123
                password_confirmation:
                  type: string
                  description: 'Must match password.'
                  example: new-password123
              required:
                - token
                - email
                - password
                - password_confirmation
      security: []
  /v1/auth/me:
    get:
      summary: 'Get Current User'
      operationId: getCurrentUser
      description: 'Return the authenticated user for the current bearer token.'
      parameters: []
      responses:
        200:
          description: 'Authenticated user profile.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: ''
                    type: users
                    attributes:
                      name: 'Morgan Hirthe'
                      email: dare.emelie@example.com
                      email_verified_at: '2026-04-22T13:19:16+00:00'
                      created_at: null
                      updated_at: null
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: ''
                      type:
                        type: string
                        example: users
                      attributes:
                        type: object
                        properties:
                          name:
                            type: string
                            example: 'Morgan Hirthe'
                          email:
                            type: string
                            example: dare.emelie@example.com
                          email_verified_at:
                            type: string
                            example: '2026-04-22T13:19:16+00:00'
                          created_at:
                            type: string
                            example: null
                            nullable: true
                          updated_at:
                            type: string
                            example: null
                            nullable: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /v1/auth/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revoke the current Sanctum token.'
      parameters: []
      responses:
        204:
          description: 'Token revoked.'
          content:
            application/json:
              schema:
                type: object
                nullable: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /v1/auth/tokens:
    get:
      summary: 'List Tokens'
      operationId: listTokens
      description: 'List personal access tokens for the authenticated user.'
      parameters: []
      responses:
        200:
          description: 'Token list payload.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: '1'
                      type: personal-access-tokens
                      attributes:
                        name: ios-app
                        abilities:
                          - 'auth:me'
                          - 'auth:logout'
                        last_used_at: null
                        expires_at: '2026-02-24T12:00:00+00:00'
                        created_at: '2026-02-23T12:00:00+00:00'
                        updated_at: '2026-02-23T12:00:00+00:00'
                        is_current: true
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: '1'
                        type: personal-access-tokens
                        attributes:
                          name: ios-app
                          abilities:
                            - 'auth:me'
                            - 'auth:logout'
                          last_used_at: null
                          expires_at: '2026-02-24T12:00:00+00:00'
                          created_at: '2026-02-23T12:00:00+00:00'
                          updated_at: '2026-02-23T12:00:00+00:00'
                          is_current: true
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: '1'
                        type:
                          type: string
                          example: personal-access-tokens
                        attributes:
                          type: object
                          properties:
                            name:
                              type: string
                              example: ios-app
                            abilities:
                              type: array
                              example:
                                - 'auth:me'
                                - 'auth:logout'
                              items:
                                type: string
                            last_used_at:
                              type: string
                              example: null
                              nullable: true
                            expires_at:
                              type: string
                              example: '2026-02-24T12:00:00+00:00'
                            created_at:
                              type: string
                              example: '2026-02-23T12:00:00+00:00'
                            updated_at:
                              type: string
                              example: '2026-02-23T12:00:00+00:00'
                            is_current:
                              type: boolean
                              example: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        403:
          description: 'Token is missing required ability.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Forbidden.
                properties:
                  message:
                    type: string
                    example: Forbidden.
      tags:
        - Authentication
    delete:
      summary: 'Revoke All Tokens'
      operationId: revokeAllTokens
      description: 'Revoke all personal access tokens for the authenticated user.'
      parameters: []
      responses:
        204:
          description: 'All tokens revoked.'
          content:
            application/json:
              schema:
                type: object
                nullable: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        403:
          description: 'Token is missing required ability.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Forbidden.
                properties:
                  message:
                    type: string
                    example: Forbidden.
      tags:
        - Authentication
  '/v1/auth/tokens/{token_id}':
    delete:
      summary: 'Revoke Token'
      operationId: revokeToken
      description: 'Revoke one personal access token owned by the authenticated user.'
      parameters: []
      responses:
        204:
          description: 'Token revoked.'
          content:
            application/json:
              schema:
                type: object
                nullable: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        403:
          description: 'Token is missing required ability.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Forbidden.
                properties:
                  message:
                    type: string
                    example: Forbidden.
        404:
          description: 'Token does not belong to current user or no longer exists.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Token not found.'
                properties:
                  message:
                    type: string
                    example: 'Token not found.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token_id:
                  type: integer
                  description: ''
                  example: 16
              required:
                - token_id
    parameters:
      -
        in: path
        name: token_id
        description: 'Personal access token id.'
        example: 42
        required: true
        schema:
          type: integer
  '/v1/webhooks/{provider}':
    post:
      summary: ''
      operationId: postV1WebhooksProvider
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
    parameters:
      -
        in: path
        name: provider
        description: ''
        example: architecto
        required: true
        schema:
          type: string
  /v1/support/chat:
    post:
      summary: ''
      operationId: postV1SupportChat
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: 'Must be at least 3 characters. Must not be greater than 500 characters.'
                  example: b
              required:
                - message
      security: []
  /v1/kyc:
    get:
      summary: "Get the authenticated user's KYC status for all types."
      operationId: getTheAuthenticatedUsersKYCStatusForAllTypes
      description: ''
      parameters: []
      responses: {  }
      tags:
        - KYC
  /v1/kyc/automatic:
    post:
      summary: 'Submit automatic KYC verification via Dojah.'
      operationId: submitAutomaticKYCVerificationViaDojah
      description: 'Returns immediately with the verification result.'
      parameters: []
      responses: {  }
      tags:
        - KYC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: ''
                  example: bvn
                  enum:
                    - nin
                    - bvn
                number:
                  type: string
                  description: 'Must be 11 digits.'
                  example: '82256977571'
              required:
                - type
                - number
  /v1/kyc/manual:
    post:
      summary: 'Submit manual KYC verification with document upload.'
      operationId: submitManualKYCVerificationWithDocumentUpload
      description: 'Stays pending until admin reviews the document.'
      parameters: []
      responses: {  }
      tags:
        - KYC
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: ''
                  example: nin
                  enum:
                    - nin
                    - bvn
                number:
                  type: string
                  description: 'Must be 11 digits.'
                  example: '82256977571'
                document:
                  type: string
                  format: binary
                  description: 'Must be a file. Must not be greater than 5120 kilobytes.'
              required:
                - type
                - number
                - document
  /v1/loans/eligibility:
    post:
      summary: ''
      operationId: postV1LoansEligibility
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: ''
                    type: object
                    example:
                      data:
                        passed: true
                        reason: null
                    properties:
                      data:
                        type: object
                        properties:
                          passed:
                            type: boolean
                            example: true
                          reason:
                            type: string
                            example: null
                            nullable: true
                  -
                    description: ''
                    type: object
                    example:
                      data:
                        passed: false
                        reason: 'Account must be at least 30 days old.'
                    properties:
                      data:
                        type: object
                        properties:
                          passed:
                            type: boolean
                            example: false
                          reason:
                            type: string
                            example: 'Account must be at least 30 days old.'
      tags:
        - Loans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                principal_amount:
                  type: number
                  description: ''
                  example: 50000
              required:
                - principal_amount
  /v1/loans:
    get:
      summary: ''
      operationId: getV1Loans
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: null
                      user_id: 5
                      principal_amount: 1097.52
                      outstanding_balance: 1097.52
                      interest_rate: 0.2934
                      repayment_term_months: 18
                      interest_method: FlatRate
                      status: active
                      disbursed_at: null
                      eligibility_passed: null
                      notes: null
                      rejection_reason: null
                      created_at: null
                    -
                      id: null
                      user_id: 6
                      principal_amount: 2349.31
                      outstanding_balance: 2349.31
                      interest_rate: 0.0611
                      repayment_term_months: 55
                      interest_method: FlatRate
                      status: active
                      disbursed_at: null
                      eligibility_passed: null
                      notes: null
                      rejection_reason: null
                      created_at: null
                  links:
                    first: '/?page=1'
                    last: '/?page=1'
                    prev: null
                    next: null
                  meta:
                    current_page: 1
                    from: 1
                    last_page: 1
                    links:
                      -
                        url: null
                        label: '&laquo; Previous'
                        page: null
                        active: false
                      -
                        url: '/?page=1'
                        label: '1'
                        page: 1
                        active: true
                      -
                        url: null
                        label: 'Next &raquo;'
                        page: null
                        active: false
                    path: /
                    per_page: 15
                    to: 2
                    total: 2
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: null
                        user_id: 5
                        principal_amount: 1097.52
                        outstanding_balance: 1097.52
                        interest_rate: 0.2934
                        repayment_term_months: 18
                        interest_method: FlatRate
                        status: active
                        disbursed_at: null
                        eligibility_passed: null
                        notes: null
                        rejection_reason: null
                        created_at: null
                      -
                        id: null
                        user_id: 6
                        principal_amount: 2349.31
                        outstanding_balance: 2349.31
                        interest_rate: 0.0611
                        repayment_term_months: 55
                        interest_method: FlatRate
                        status: active
                        disbursed_at: null
                        eligibility_passed: null
                        notes: null
                        rejection_reason: null
                        created_at: null
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: null
                          nullable: true
                        user_id:
                          type: integer
                          example: 5
                        principal_amount:
                          type: number
                          example: 1097.52
                        outstanding_balance:
                          type: number
                          example: 1097.52
                        interest_rate:
                          type: number
                          example: 0.2934
                        repayment_term_months:
                          type: integer
                          example: 18
                        interest_method:
                          type: string
                          example: FlatRate
                        status:
                          type: string
                          example: active
                        disbursed_at:
                          type: string
                          example: null
                          nullable: true
                        eligibility_passed:
                          type: string
                          example: null
                          nullable: true
                        notes:
                          type: string
                          example: null
                          nullable: true
                        rejection_reason:
                          type: string
                          example: null
                          nullable: true
                        created_at:
                          type: string
                          example: null
                          nullable: true
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: '/?page=1'
                      last:
                        type: string
                        example: '/?page=1'
                      prev:
                        type: string
                        example: null
                        nullable: true
                      next:
                        type: string
                        example: null
                        nullable: true
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      from:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 1
                      links:
                        type: array
                        example:
                          -
                            url: null
                            label: '&laquo; Previous'
                            page: null
                            active: false
                          -
                            url: '/?page=1'
                            label: '1'
                            page: 1
                            active: true
                          -
                            url: null
                            label: 'Next &raquo;'
                            page: null
                            active: false
                        items:
                          type: object
                          properties:
                            url:
                              type: string
                              example: null
                              nullable: true
                            label:
                              type: string
                              example: '&laquo; Previous'
                            page:
                              type: string
                              example: null
                              nullable: true
                            active:
                              type: boolean
                              example: false
